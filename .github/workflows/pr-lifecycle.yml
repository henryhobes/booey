###############################################################################
# pr-lifecycle.yml — Auto-merge agent-authored PRs
#
# Closes the autonomous loop:
#   Agent PR → CI passes → Claude review clean → AUTO-MERGE
#
# TRIGGER STRATEGY:
#   We listen on three events to catch "both CI and review are done":
#   1. check_suite:completed — CI just finished (pass or fail)
#   2. issue_comment:created — Claude's review comment just posted
#   3. pull_request:labeled   — label added (e.g. review-approved)
#   On ANY trigger, we re-check ALL conditions before merging.
#   This eliminates race conditions entirely.
#
# MERGE STRATEGY:
#   We use `gh pr merge --squash` directly (not --auto) because:
#   - --auto requires branch protection rules + repo setting enabled
#   - Direct merge is simpler and gives us full control over conditions
#   - We do our own safety checks which are stricter than branch protection
#
# REQUIRED REPO SETTINGS:
#   - None! This workflow handles everything.
#   - Optional: enable branch protection on main for extra safety.
#
# PERMISSIONS:
#   - contents:write — needed to merge the PR
#   - pull-requests:write — needed to comment/label
#   - actions:read — needed to check CI status
#   - checks:read — needed to query check runs
###############################################################################
name: PR Lifecycle

on:
  # CI finished — check if review is also done
  check_suite:
    types: [completed]

  # Claude's review comment posted (sticky comment update)
  issue_comment:
    types: [created, edited]

  # Label added — could be agent-authored or review signal
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  actions: read
  checks: read

# Only one lifecycle check per PR at a time
concurrency:
  group: pr-lifecycle-${{ github.event.pull_request.number || github.event.issue.number || github.event.check_suite.head_branch }}
  cancel-in-progress: true

jobs:
  auto-merge:
    # Skip check_suite events on main branch (triggered by merges, no PR to process)
    if: >
      github.event_name != 'check_suite' ||
      github.event.check_suite.head_branch != 'main'
    runs-on: ubuntu-latest

    steps:
      ##########################################################################
      # STEP 1: Find the PR associated with this event
      ##########################################################################
      - name: Resolve PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber, pr;

            if (context.eventName === 'pull_request') {
              prNumber = context.payload.pull_request.number;
            } else if (context.eventName === 'issue_comment') {
              // issue_comment fires for PR comments too
              if (!context.payload.issue.pull_request) {
                core.info('Not a PR comment, skipping');
                return;
              }
              prNumber = context.payload.issue.number;
            } else if (context.eventName === 'check_suite') {
              // Find PR for this branch
              const branch = context.payload.check_suite.head_branch;
              const prs = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: `${context.repo.owner}:${branch}`,
                state: 'open'
              });
              if (prs.data.length === 0) {
                core.info(`No open PR for branch ${branch}`);
                return;
              }
              prNumber = prs.data[0].number;
            }

            if (!prNumber) return;

            // Fetch full PR data
            const { data } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            pr = data;

            // Must be open
            if (pr.state !== 'open') {
              core.info('PR is not open');
              return;
            }

            core.setOutput('number', prNumber);
            core.setOutput('found', 'true');
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('labels', JSON.stringify(pr.labels.map(l => l.name)));
            core.setOutput('author', pr.user.login);

      ##########################################################################
      # STEP 2: Safety gate — labels, author, file checks
      ##########################################################################
      - name: Safety checks
        if: steps.pr.outputs.found == 'true'
        id: safety
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.pr.outputs.number }};
            const labels = JSON.parse('${{ steps.pr.outputs.labels }}');
            const author = '${{ steps.pr.outputs.author }}';

            // GATE 1: Must have agent-authored label
            if (!labels.includes('agent-authored')) {
              core.info('Missing agent-authored label — skipping');
              return;
            }

            // GATE 2: Must NOT have needs-human label
            if (labels.includes('needs-human')) {
              core.info('Has needs-human label — skipping');
              return;
            }

            // GATE 3: Check commit count (escalate if too many fix attempts)
            const MAX_COMMITS = 7;
            const commits = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100
            });
            if (commits.data.length > MAX_COMMITS) {
              core.warning(`PR has ${commits.data.length} commits (>${MAX_COMMITS}). Adding needs-human label.`);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: ['needs-human']
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `⚠️ **Auto-merge blocked**: This PR has ${commits.data.length} commits, exceeding the safety threshold of ${MAX_COMMITS}. This suggests the agent is struggling. A human should review before merging.`
              });
              return;
            }

            // GATE 4: Security-sensitive file check
            const SENSITIVE_PATTERNS = [
              /^src\/middleware/i,
              /^src\/lib\/auth/i,
              /^src\/lib\/supabase/i,
              /supabase\/migrations/i,
              /\.env/i,
              /rls/i,
              /security/i,
              /^\.github\/workflows/i,  // Don't let agent modify its own workflows
            ];

            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100
            });

            const sensitiveFiles = files.data
              .map(f => f.filename)
              .filter(f => SENSITIVE_PATTERNS.some(p => p.test(f)));

            if (sensitiveFiles.length > 0) {
              core.info(`PR touches sensitive files: ${sensitiveFiles.join(', ')}. Adding needs-human label.`);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: ['needs-human']
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `🔒 **Auto-merge blocked**: This PR modifies security-sensitive files:\n${sensitiveFiles.map(f => '- `' + f + '`').join('\n')}\n\nA human must review and merge manually.`
              });
              return;
            }

            core.setOutput('passed', 'true');

      ##########################################################################
      # STEP 3: Check CI status — all required checks must pass
      ##########################################################################
      - name: Check CI status
        if: steps.safety.outputs.passed == 'true'
        id: ci
        uses: actions/github-script@v7
        with:
          script: |
            const headSha = '${{ steps.pr.outputs.head_sha }}';

            // Get all check runs for this commit
            const { data } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha,
              per_page: 100
            });

            // Our CI jobs (from ci.yml)
            const REQUIRED_CHECKS = ['lint', 'typecheck', 'build', 'test'];

            const checksByName = {};
            for (const run of data.check_runs) {
              // Use the latest run for each check name
              if (!checksByName[run.name] ||
                  new Date(run.completed_at) > new Date(checksByName[run.name].completed_at)) {
                checksByName[run.name] = run;
              }
            }

            const results = [];
            for (const name of REQUIRED_CHECKS) {
              const check = checksByName[name];
              if (!check) {
                core.info(`Required check "${name}" not found yet`);
                return; // Not all checks have run yet
              }
              if (check.status !== 'completed') {
                core.info(`Check "${name}" still running`);
                return; // Still in progress
              }
              if (check.conclusion !== 'success') {
                core.info(`Check "${name}" did not pass (${check.conclusion})`);
                return; // Failed
              }
              results.push(`✅ ${name}`);
            }

            core.info(`All CI checks passed: ${results.join(', ')}`);
            core.setOutput('passed', 'true');

      ##########################################################################
      # STEP 4: Check Claude review — parse sticky comment for approval
      ##########################################################################
      - name: Check review status
        if: steps.ci.outputs.passed == 'true'
        id: review
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.pr.outputs.number }};

            // Claude Code Action posts a sticky comment (edited in place).
            // Look for the latest comment from the bot that contains review output.
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100
            });

            // Find Claude's review comment (sticky comment from claude-code-action)
            // It typically comes from github-actions[bot] and contains review markers
            const claudeComments = comments.data.filter(c => {
              const isBot = c.user.type === 'Bot' || c.user.login.includes('[bot]') || c.user.login === 'github-actions[bot]';
              // Claude Code Action sticky comments contain progress tracking markers
              const hasReviewContent = c.body && (
                c.body.includes('Claude Code') ||
                c.body.includes('APPROVED') ||
                c.body.includes('CRITICAL') ||
                c.body.includes('review')
              );
              return isBot && hasReviewContent;
            });

            if (claudeComments.length === 0) {
              core.info('No Claude review comment found yet');
              return;
            }

            // Use the most recently updated comment
            const reviewComment = claudeComments.sort(
              (a, b) => new Date(b.updated_at) - new Date(a.updated_at)
            )[0];

            const body = reviewComment.body;

            // BLOCK: Review still in progress
            if (body.includes('In progress') || body.includes('🔄') || body.includes('reviewing')) {
              // Check if it also has completion markers
              if (!body.includes('Completed') && !body.includes('✅ APPROVED')) {
                core.info('Review still in progress');
                return;
              }
            }

            // Count issues
            const warningCount = (body.match(/⚠️ WARNING/g) || []).length;
            const criticalCount = (body.match(/CRITICAL/g) || []).length;

            if (criticalCount > 0 || warningCount > 0) {
              const allComments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                per_page: 100
              });

              // Find the most recent fix request comment
              const fixRequests = allComments.data.filter(c =>
                c.body && c.body.includes('<!-- pr-lifecycle-fix-request -->')
              );
              
              if (fixRequests.length === 0) {
                // Never asked — request fix
                core.info(`Found ${criticalCount} critical and ${warningCount} warning issues. Requesting fixes.`);
                core.setOutput('needs_fix', 'true');
                core.setOutput('fix_summary', `Found ${criticalCount} critical and ${warningCount} warning issues.`);
                return;
              }

              // We've asked before. Did Claude push new commits since?
              const lastFixRequest = fixRequests[fixRequests.length - 1];
              const lastFixRequestTime = new Date(lastFixRequest.created_at);

              const commits = await github.rest.pulls.listCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                per_page: 100
              });
              const lastCommit = commits.data[commits.data.length - 1];
              const lastCommitTime = new Date(lastCommit.commit.committer.date);

              if (lastCommitTime > lastFixRequestTime) {
                // Claude pushed after our request, but review still has issues — ask again
                core.info(`Claude pushed after fix request but review still has ${criticalCount} critical and ${warningCount} warning. Requesting another round.`);
                core.setOutput('needs_fix', 'true');
                core.setOutput('fix_summary', `Still ${criticalCount} critical and ${warningCount} warning after fix attempt.`);
                return;
              }

              // Claude didn't push after our last request — nothing more to fix. Merge.
              core.info('Claude did not push new commits after fix request. Merging with remaining warnings.');
              core.setOutput('passed', 'true');
              core.setOutput('comment_id', reviewComment.id);
              return;
            }

            // APPROVE: Explicit approval marker
            if (body.includes('APPROVED')) {
              core.info('Review is clean — approved for merge');
              core.setOutput('passed', 'true');
              core.setOutput('comment_id', reviewComment.id);
              return;
            }

            core.info('Review comment found but no clear approval signal');

      ##########################################################################
      # STEP 4.5: Request fixes from Claude if review has issues
      ##########################################################################
      - name: Request review fixes from Claude
        if: steps.review.outputs.needs_fix == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pr.outputs.number }},
              body: [
                '<!-- pr-lifecycle-fix-request -->',
                '🔄 **Review has issues** — ${{ steps.review.outputs.fix_summary }}',
                '',
                '@claude Please address the CRITICAL and WARNING items from the review above. If you believe any are false positives, you can skip them — the PR will be merged on the next cycle.',
              ].join('\n')
            });

      ##########################################################################
      # STEP 5: Merge! 🎉
      ##########################################################################
      - name: Checkout (needed for gh cli)
        if: steps.review.outputs.passed == 'true'
        uses: actions/checkout@v4

      - name: Squash merge PR
        if: steps.review.outputs.passed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ steps.pr.outputs.number }}
          echo "🚀 Auto-merging PR #${PR_NUMBER}"

          # Squash merge with auto-generated commit message
          gh pr merge "${PR_NUMBER}" \
            --squash \
            --auto \
            --delete-branch

          # If --auto doesn't work (no branch protection), try direct merge
          if [ $? -ne 0 ]; then
            echo "Auto-merge flag failed, trying direct merge..."
            gh pr merge "${PR_NUMBER}" \
              --squash \
              --delete-branch \
              --body "Auto-merged by pr-lifecycle.yml after CI ✅ and review ✅"
          fi

      - name: Comment merge confirmation
        if: steps.review.outputs.passed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pr.outputs.number }},
              body: [
                '🤖 **Auto-merged** by `pr-lifecycle.yml`',
                '',
                '| Check | Status |',
                '|-------|--------|',
                '| CI | ✅ All checks passed |',
                '| Review | ✅ Approved (no critical/warning issues) |',
                '| Safety | ✅ No sensitive files, commit count OK |',
                '',
                '<!-- pr-lifecycle-merged -->'
              ].join('\n')
            });

      - name: Notify via Telegram
        if: steps.review.outputs.passed == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          PR_NUMBER=${{ steps.pr.outputs.number }}
          PR_TITLE=$(gh pr view "${PR_NUMBER}" --json title --jq .title 2>/dev/null || echo "PR #${PR_NUMBER}")
          MESSAGE="🤖 Auto-merged PR #${PR_NUMBER}: ${PR_TITLE}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MESSAGE}" \
            -d parse_mode="HTML" || true
