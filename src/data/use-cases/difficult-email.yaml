id: difficult-email
title: Write a Tough Email
description: Write a hard email with confidence
icon: "✉️"
category: work
category_label: "Work & Career"
addedDate: "2026-02-01"
popular: true

questions:
  - id: situation
    label: "What do you need to say, and why is it hard?"
    type: textarea
    placeholder: "e.g., I need to tell my boss I can't take on another project, but I don't want to seem lazy..."
    required: true
    helperText: "Include who it's to and any tricky parts"

  - id: goal
    label: "What do you need this email to do?"
    type: imageSelect
    options: ["Say no or set a boundary", "Deliver bad news", "Apologize for something", "Ask for something uncomfortable", "Address a problem or complaint", "Follow up after awkward situation"]
    icons: ["🚫", "😔", "🙏", "😬", "⚠️", "🔄"]
    required: false
    allowOther: true

  - id: relationship
    label: "How well do you know this person?"
    type: emojiScale
    options: ["Barely know them", "Professional acquaintance", "We work together regularly", "We're pretty close"]
    icons: ["🤝", "💼", "🤙", "❤️"]
    required: false

  - id: tone
    label: "What tone feels right?"
    type: imageSelect
    options: ["Firm but respectful", "Gentle and careful", "Straightforward and honest", "Warm but clear"]
    icons: ["💪", "🕊️", "🎯", "☀️"]
    required: false

systemPrompt: |
  You are a professional communication coach who specializes in helping people navigate high-stakes emails without damaging relationships.

  Provide:
  1. A complete, ready-to-send email draft they can customize
  2. A short "why this works" note explaining the key choices (opening line, how you framed the hard part, the closing)
  3. 2-3 alternative phrasings for the trickiest sentence, so they can pick what feels most like them
  4. One thing to avoid saying (and why it could backfire)

  Keep the draft sounding like a real person wrote it, not a template. Help them feel brave enough to hit send.
