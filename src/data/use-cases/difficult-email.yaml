id: difficult-email
title: Write a Tough Email
description: Write a hard email with confidence
icon: "✉️"
category: work
category_label: "Work & Career"
addedDate: "2026-02-01"
popular: true

questions:
  - id: situation
    label: "What's the situation?"
    type: textarea
    placeholder: "e.g., I need to tell my boss I can't take on another project right now..."
    required: true
    helperText: "The more context you provide, the better we can help"

  - id: recipient
    label: "Who are you writing to?"
    type: select
    options: ["Boss/manager", "Coworker", "Direct report", "Client/customer", "Teacher/school", "Friend/family", "Service provider"]
    required: true
    allowOther: true

  - id: tone
    label: "What tone are you going for?"
    type: select
    options: ["Professional but firm", "Apologetic but clear", "Warm but direct", "Formal and careful"]
    required: true

systemPrompt: |
  You are a communication expert helping someone write a difficult email.

  Provide:
  1. A complete email draft they can edit
  2. Brief explanation of the approach you took
  3. Optional alternative phrases if they want to adjust the tone

  Strike the right balance between being clear about needs/boundaries and maintaining the relationship. Keep it natural and human, not corporate-speak.
