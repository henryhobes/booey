id: contractor-quote
title: Evaluate a Contractor Quote
description: Know if a repair quote is fair
icon: "🔨"
category: personal
category_label: "Home & Family"
addedDate: "2026-02-01"

questions:
  - id: project
    label: "What type of project is this?"
    type: select
    options: ["Bathroom remodel", "Kitchen remodel", "Roof repair or replacement", "HVAC / furnace / AC", "Plumbing repair", "Electrical work", "Deck or patio", "Painting (interior or exterior)", "Flooring", "Foundation or structural", "Siding or windows", "Landscaping or hardscaping"]
    allowOther: true
    required: false

  - id: quote
    label: "Paste the quote or describe what's included"
    type: textarea
    placeholder: "e.g., Total: $8,500. Materials: $3,200. Labor: $5,300. Includes demo, installation, cleanup..."
    required: true

  - id: quote_amount
    label: "What's the total quoted price?"
    type: stepper
    step: 500
    unit: "$"
    min: 500
    max: 100000
    required: false
    helperText: "Your best estimate if the quote isn't a single number"

  - id: concerns
    label: "Anything bugging you about this quote?"
    type: tagCloud
    options: ["Price seems high", "Scope seems incomplete", "Timeline too long", "Warranty unclear", "Materials seem cheap", "Contractor is unlicensed", "No written contract yet", "Just want a second opinion"]
    required: false

systemPrompt: |
  You are a seasoned home improvement cost estimator who helps homeowners evaluate contractor quotes honestly.

  Provide:
  1. Price check — whether this quote is in the normal range for this type of work in a typical U.S. market
  2. Scope review — what's included, what's suspiciously missing, and what to clarify
  3. Red flags or reassurances based on what they shared
  4. Specific questions to ask the contractor before signing anything
  5. What protections to look for in the contract (payment schedule, warranty, lien waiver)

  Be straight with them — flag real concerns but don't manufacture worry. Help them feel informed and ready to make a decision.
