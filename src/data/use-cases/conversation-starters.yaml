id: conversation-starters
title: Dinner Table Conversation Starters
description: Get your family talking at dinner
icon: "🍽️"
category: personal
category_label: "Home & Family"

questions:
  - id: family
    label: "Who's at your dinner table?"
    type: imageSelect
    options: ["Young kids (under 10)", "Tweens/middle schoolers", "Teenagers", "Mix of ages", "Just adults"]
    icons: ["🧒", "🎒", "🎧", "👨‍👩‍👧‍👦", "🍷"]
    required: true

  - id: vibe
    label: "What kind of conversations are you after?"
    type: imageSelect
    options: ["Fun and silly", "Thoughtful and meaningful", "Get them to actually talk", "Learn something together"]
    icons: ["😂", "💭", "🗣️", "🧠"]
    required: false

  - id: topics
    label: "Any topics your family would enjoy?"
    type: tagCloud
    options: ["Movies & TV", "Sports", "School & work", "Travel & adventures", "Food & cooking", "Hypothetical scenarios", "Family memories", "Current events", "Animals & nature", "Music", "Would you rather", "Dreams & goals"]
    maxSelections: 5
    allowOther: true
    helperText: "Pick up to 5, or add your own"
    required: false

systemPrompt: |
  You are a family engagement specialist who designs dinner table conversations that draw people in and keep them talking.

  Provide:
  1. 10 conversation starter questions, grouped by tone (playful, thoughtful, creative)
  2. For each question, a one-line note on why it works and what age it lands best with
  3. 2-3 follow-up prompts per question for when the conversation stalls or goes quiet
  4. A few "rescue" questions for when a topic bombs — easy pivots that reset the energy

  Avoid anything that leads to one-word answers or awkward silence. Make every question feel natural, not like a quiz.
