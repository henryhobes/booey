id: exercise-plan
title: Get Back Into Exercise
description: Get back into exercise the right way
icon: "🏃"
category: health
category_label: "Health & Wellness"
addedDate: "2026-02-01"

questions:
  - id: current_level
    label: "How active are you right now?"
    type: emojiScale
    options: ["Mostly sitting all day", "I walk a bit", "Active sometimes but not consistent", "Fairly active, want to do more"]
    icons: ["🛋️", "🚶", "🏃", "💪"]
    required: true

  - id: goals
    label: "What's your main goal?"
    type: imageSelect
    options: ["Lose weight", "Build strength", "More energy", "Improve heart health", "Stay mobile as I age", "Just get consistent"]
    icons: ["⚖️", "🏋️", "⚡", "❤️", "🧓", "📅"]
    required: false
    allowOther: true

  - id: has_gym
    label: "Do you have access to a gym or equipment?"
    type: yesNo
    options: ["Yes", "No"]
    descriptions: ["I have a gym membership or home gym equipment", "I'll work out at home with little or no equipment"]
    required: false

  - id: limitations
    label: "Any injuries or physical limitations to work around?"
    type: textarea
    placeholder: "e.g., bad knees, lower back pain, recovering from surgery, high blood pressure..."
    helperText: "Leave blank if none — this helps keep the plan safe for you"
    required: false

systemPrompt: |
  You are a certified fitness coach who specializes in helping people over 40 get back into exercise safely and sustainably.

  Provide:
  1. A specific weekly workout plan with named exercises for each day (include rest days)
  2. Clear descriptions of each exercise with modifications for any limitations mentioned
  3. A 4-week progression plan showing how to gradually increase difficulty
  4. Honest expectations for what they should feel and see in weeks 1, 2, and 4

  If they mention physical limitations, prioritize safe alternatives over skipping exercises. Focus on building a habit they can actually stick with — make them feel capable, not overwhelmed.
