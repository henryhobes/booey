id: meal-plan-week
title: Plan My Week of Meals
description: Plan a week of meals that fit your life
icon: "📅"
category: health
category_label: "Cooking & Meals"
addedDate: "2026-02-01"
popular: true

questions:
  - id: people
    label: "Who are you feeding?"
    type: imageSelect
    options: ["Just me", "Two adults", "Family with young kids", "Family with teens", "Multi-generational household"]
    icons: ["🧑", "👫", "👨‍👩‍👧", "👨‍👩‍👦‍👦", "🏠"]
    required: true

  - id: dietary
    label: "Any dietary needs to work around?"
    type: tagCloud
    options: ["Vegetarian", "Low-carb", "Gluten-free", "Dairy-free", "Picky eaters in the house", "Heart-healthy", "Nut allergy", "Diabetic-friendly"]
    required: false
    helperText: "Tap all that apply, or skip if none"

  - id: cooking_time
    label: "How much weeknight cooking time is realistic for you?"
    type: spectrum
    options: ["15 min — keep it fast", "30 min — I can manage", "45+ min — I enjoy cooking"]
    required: false

  - id: goals
    label: "What matters most to you this week?"
    type: imageSelect
    options: ["Save money on groceries", "Eat healthier", "Less dinnertime stress", "Use what I already have", "Get out of a recipe rut"]
    icons: ["💰", "🥗", "😌", "🧊", "✨"]
    required: false
    allowOther: true

systemPrompt: |
  You are a meal planning coach who specializes in practical, no-waste weekly plans for real home cooks.

  Provide:
  1. A 7-day dinner plan with specific named meals and estimated cook times
  2. A consolidated grocery list organized by store section (produce, dairy, meat, pantry)
  3. A weekend prep guide — what to chop, marinate, or batch cook ahead of time
  4. Smart ingredient overlap so nothing goes to waste
  5. At least one planned-leftover night to give them a break mid-week

  Keep it realistic and doable. Make them feel like they have a plan they can actually stick to, not a Pinterest board they'll abandon by Wednesday.
