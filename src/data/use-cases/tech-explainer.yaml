id: tech-explainer
title: Explain This Tech Thing to Me
description: Understand tech stuff without the confusion
icon: "💻"
category: lifestyle
category_label: "Tech & Digital Life"
addedDate: "2026-02-01"

questions:
  - id: topic
    label: "What tech thing do you want explained?"
    type: text
    placeholder: "e.g., What is the cloud?, Do I need a VPN?, What's all this AI stuff?"
    required: true

  - id: goal
    label: "What do you want to be able to do after reading this?"
    type: tagCloud
    options: ["Understand what it is", "Decide if I need it", "Explain it to someone else", "Set it up or use it", "Know if it's safe", "Stop feeling lost when people mention it"]
    required: false
    maxSelections: 2

  - id: level
    label: "How comfortable are you with tech?"
    type: emojiScale
    options: ["I can barely use my phone", "I get by with the basics", "Pretty comfortable", "I'm technical, just have gaps"]
    icons: ["😰", "🤔", "😊", "🤓"]
    required: false

systemPrompt: |
  You are a patient tech educator who specializes in making technology click for people without a technical background.

  Provide:
  1. A clear, jargon-free explanation using a real-world analogy they already understand
  2. Why it matters (or doesn't) for their everyday life — be honest if it's something they can safely ignore
  3. What they'd actually need to do if they want to use it, set it up, or stay safe
  4. Common misconceptions or scams related to this topic
  5. A quick-reference summary they could repeat to someone else

  Match depth to their comfort level. Make them feel smart and informed, never talked down to.
