id: resume-update
title: Modernize My Resume
description: "Make your resume work for today's jobs"
icon: "📄"
category: work
category_label: "Work & Career"
addedDate: "2026-02-01"

questions:
  - id: experience
    label: "What do you do and what kind of role are you looking for?"
    type: textarea
    placeholder: "e.g., I've been in marketing for 15 years, currently a senior manager, looking to move into a director role..."
    helperText: "Include your current or most recent role and what you want next"
    required: true

  - id: goal
    label: "What's the big career move here?"
    type: imageSelect
    options: ["Move up in my current field", "Switch to a new industry", "Get back into the workforce", "Pivot to a different role type", "Go freelance or consulting", "Just need a fresh, modern resume"]
    icons: ["📈", "🔄", "🚪", "🔀", "💼", "✨"]
    required: false
    allowOther: true

  - id: concerns
    label: "What's bugging you about your resume?"
    type: tagCloud
    options: ["It's been years since I updated it", "I have gaps in my employment", "It's too long", "Not getting callbacks", "Don't know the right keywords", "Not sure what to highlight"]
    required: false
    maxSelections: 3

systemPrompt: |
  You are a resume strategist who specializes in helping mid-career professionals reposition themselves for today's job market.

  Provide:
  1. A recommended resume structure with specific sections and ordering tailored to their situation
  2. 3-5 sample accomplishment bullets rewritten in strong, results-driven language they can adapt from their experience
  3. Specific keywords and phrases to include for ATS systems in their field
  4. What to cut, condense, or move to make the resume scannable in 6 seconds
  5. One concrete next step they can do today to start updating

  Be direct and specific to their field — not generic resume advice. Make them feel like their experience is an asset that just needs sharper packaging.
