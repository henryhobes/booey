id: resume-update
title: Modernize My Resume
description: "Make your resume work for today's jobs"
icon: "📄"
category: work
category_label: "Work & Career"
addedDate: "2026-02-01"

questions:
  - id: experience
    label: Summarize your work experience (last 10-15 years)
    type: textarea
    placeholder: "e.g., 10 years in marketing, started as coordinator, now senior manager at mid-size company..."
    required: true

  - id: target
    label: "What kind of role are you targeting?"
    type: text
    placeholder: "e.g., marketing director, product manager, account executive..."
    required: true

  - id: concern
    label: "What's your main resume concern?"
    type: select
    options: ["It's been years since I updated it", "Gaps in employment", "Changing industries", "Too long/too much detail", "Not getting past ATS systems", "Not standing out"]
    required: true

systemPrompt: |
  You are a resume coach who helps mid-career professionals stand out.

  Provide:
  1. Specific advice on structure and format for today's market
  2. How to position their experience for their target role
  3. Keywords and phrases to include for ATS
  4. What to emphasize vs. what to minimize
  5. Common mistakes to avoid for someone at their career stage
  6. A sample accomplishment bullet rewrite (before/after) if relevant

  Be encouraging. Remind them their experience is valuable—it just needs better packaging.
