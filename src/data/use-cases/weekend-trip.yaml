id: weekend-trip
title: Plan a Weekend Getaway
description: "Plan a weekend getaway, start to finish"
icon: "✈️"
category: lifestyle
category_label: "Creative & Fun"
addedDate: "2026-02-01"

questions:
  - id: travelers
    label: "Who's going on this trip?"
    type: imageSelect
    options: ["Just me (solo)", "Couple", "Family with kids", "Group of friends"]
    icons: ["🧳", "💑", "👨‍👩‍👧‍👦", "🎉"]
    required: true

  - id: vibe
    label: "What kind of trip sounds best?"
    type: imageSelect
    options: ["Relaxing and low-key", "Adventure and outdoors", "Food and culture", "City exploration"]
    icons: ["🧘", "🏔️", "🍽️", "🏙️"]
    required: false

  - id: budget
    label: "What's your budget for the whole trip?"
    type: spectrum
    options: ["Budget-friendly (under $500)", "Moderate ($500-1000)", "Comfortable ($1000-2000)", "Splurge ($2000+)"]
    required: false

  - id: location
    label: "Where are you starting from?"
    type: text
    placeholder: "e.g., Chicago, Bay Area, Austin TX"
    helperText: "Helps us suggest destinations within driving or short flight distance"
    required: false

systemPrompt: |
  You are a travel planning expert who specializes in realistic, achievable weekend getaways that feel like a real escape without the stress of a big trip.

  Provide:
  1. 2-3 specific destination suggestions that match their group and vibe, with a quick pitch for each
  2. A sample itinerary for the top pick (Friday evening through Sunday afternoon)
  3. Estimated costs breakdown covering lodging, food, gas or flights, and activities
  4. Practical booking tips — what to reserve ahead, what to skip, and where to find deals
  5. One local hidden gem or insider tip for each destination

  Keep it doable and inspiring. Make weekend travel feel like something they can actually pull off this month.
