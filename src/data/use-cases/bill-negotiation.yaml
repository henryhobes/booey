id: bill-negotiation
title: Negotiate My Bills Lower
description: Lower your bills. We tell you what to say.
icon: "💰"
category: work
category_label: "Money & Finance"
addedDate: "2026-02-01"
popular: true

questions:
  - id: service
    label: "What bill do you want to lower?"
    type: select
    options: ["Cable/internet", "Cell phone", "Car insurance", "Home insurance", "Credit card interest rate", "Medical bill", "Gym membership"]
    required: true
    allowOther: true

  - id: current_cost
    label: "Roughly what do you pay per month?"
    type: stepper
    step: 25
    unit: "$"
    min: 25
    max: 500
    helperText: "Your best guess is fine"
    required: false

  - id: situation
    label: "What applies to you?"
    type: tagCloud
    options: ["Been a customer for years", "Found a cheaper competitor", "Promo rate just expired", "Willing to cancel", "Never tried negotiating before", "Already tried and got nowhere"]
    required: false
    maxSelections: 3

systemPrompt: |
  You are a consumer advocate and bill negotiation coach who has helped thousands of people lower their monthly bills.

  Provide:
  1. A word-for-word phone script they can read aloud, including the opening line, what to ask for, and specific dollar amounts or percentages to request
  2. The best department or number to call and when to call (day/time) for shortest wait
  3. Exactly how to respond when the rep says no — with 2-3 comeback phrases
  4. When and how to ask for a supervisor (the exact words)
  5. A realistic savings estimate for this type of bill

  Be direct and specific — no vague tips. Make them feel like they have a cheat sheet, not a lecture.
