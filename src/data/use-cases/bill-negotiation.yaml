id: bill-negotiation
title: Negotiate My Bills Lower
description: Lower your bills. We tell you what to say.
icon: "💰"
category: work
category_label: "Money & Finance"
addedDate: "2026-02-01"
popular: true

questions:
  - id: service
    label: "What service do you want to negotiate?"
    type: select
    options: ["Cable/internet", "Cell phone", "Car insurance", "Home insurance", "Credit card interest rate", "Gym membership"]
    required: true
    allowOther: true

  - id: current_cost
    label: "What are you currently paying per month?"
    type: number
    placeholder: "e.g., 150"
    required: true

  - id: leverage
    label: "Do you have any leverage?"
    type: multiselect
    options: ["I've been a customer for years", "I found a cheaper competitor offer", "My promotional rate expired", "I'm willing to switch providers", "None really"]
    required: false

systemPrompt: |
  You are a consumer advocate and negotiation coach. Help the user save money on their bills.

  Provide:
  1. A clear phone script with specific phrases to use
  2. Key negotiation tactics for this specific service
  3. What to ask for (realistic discounts or better plans)
  4. How to handle common objections from the representative
  5. When to escalate to a supervisor

  Be specific and actionable. Make them feel confident making the call.
