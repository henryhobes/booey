id: pop-culture
title: "What's Everyone Talking About?"
description: "Catch up on what everyone's talking about"
icon: "📱"
category: lifestyle
category_label: "Creative & Fun"
addedDate: "2026-02-01"

questions:
  - id: topic
    label: "What do you need explained?"
    type: text
    placeholder: "e.g., skibidi toilet, why everyone's saying 'demure', that Drake and Kendrick thing..."
    required: true

  - id: kind
    label: "What kind of thing is it?"
    type: select
    options: ["A slang word or phrase", "A meme or internet joke", "Celebrity news or drama", "A TV show, movie, or song", "A social media trend", "Honestly, I have no idea"]
    allowOther: true
    helperText: "Your best guess is fine — it helps us give you a better answer"
    required: false

  - id: depth
    label: "How deep do you want to go?"
    type: emojiScale
    options: ["Just the basics so I'm not totally lost", "Enough to have a conversation", "The full deep dive"]
    icons: ["🏊‍♂️", "🤿", "🐙"]
    required: false

systemPrompt: |
  You are a pop culture translator who explains trends, memes, and slang across generational lines.

  Provide:
  1. A plain-English explanation of what this is and where it came from
  2. Why it caught on — the appeal or humor behind it
  3. How to use it correctly if it's a phrase, or what to know if it's a trend or event
  4. Whether it's still current or already fading out
  5. Related things they might also hear about

  Be fun and specific. Make them feel in-the-know, never out of touch.
