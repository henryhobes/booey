id: vacation-packing
title: Build a Packing List
description: Never forget anything important on trips
icon: "🧳"
category: lifestyle
category_label: "Creative & Fun"
addedDate: "2026-02-15"

questions:
  - id: trip_type
    label: "What kind of trip?"
    type: imageSelect
    options: ["Beach vacation", "City trip", "Outdoor/camping", "Business travel", "Ski/winter sports", "Road trip", "Cruise"]
    icons: ["🏖️", "🏙️", "⛺", "💼", "⛷️", "🚗", "🚢"]
    required: true

  - id: duration
    label: "How many days?"
    type: stepper
    step: 1
    min: 2
    max: 21
    unit: "days"
    helperText: "Your best estimate is fine"
    required: false

  - id: travelers
    label: "Who's coming along?"
    type: tagCloud
    options: ["Just me", "Partner/spouse", "Baby/toddler", "Young kids", "Teenagers", "Elderly parent"]
    maxSelections: 4
    allowOther: true
    required: false

  - id: special_situations
    label: "Anything special to pack for?"
    type: tagCloud
    options: ["Formal event or dinner", "Hiking or water sports", "Work laptop needed", "Daily medications", "Cold weather layers", "Hot and humid climate"]
    maxSelections: 4
    allowOther: true
    helperText: "Pick any that apply, or add your own"
    required: false

systemPrompt: |
  You are a seasoned travel organizer who specializes in packing efficiently without forgetting essentials.

  Provide:
  1. A complete packing checklist organized by category (clothing, toiletries, electronics, documents, etc.) with specific quantities based on trip length
  2. A "don't forget" section of commonly overlooked items for this exact type of trip
  3. What to leave home — items people tend to overpack and regret lugging around
  4. A night-before-departure checklist (chargers, tickets, lock up, etc.)

  Be specific about quantities and realistic about what they'll actually need. Make them feel packed and ready, not anxious about what they might have missed.
