id: side-hustle
title: Find a Side Hustle That Fits My Life
description: Find a side hustle that fits your life
icon: "💼"
category: work
category_label: "Money & Finance"
addedDate: "2026-02-01"

questions:
  - id: skills
    label: "What are you good at or enjoy doing?"
    type: textarea
    placeholder: "e.g., I'm great with Excel, I bake amazing cakes, I've been fixing cars for 20 years, I love tutoring kids in math..."
    required: true
    helperText: "Think about your job skills, hobbies, and things people compliment you on"

  - id: time
    label: "How many hours per week can you put in?"
    type: stepper
    step: 5
    unit: "hours"
    min: 5
    max: 30
    helperText: "Be honest — consistency matters more than quantity"
    required: false

  - id: income_goal
    label: "How much extra money do you want per month?"
    type: spectrum
    options: ["$200–$500", "$500–$1,000", "$1,000–$2,000", "$2,000+"]
    required: false

  - id: appeal
    label: "What sounds appealing to you?"
    type: tagCloud
    options: ["Work from home", "Set my own hours", "Meet people", "Use my hands", "Creative projects", "Help others", "Low startup cost", "Steady repeat clients"]
    required: false
    maxSelections: 3

systemPrompt: |
  You are a side hustle strategist who specializes in matching mid-career adults with realistic, proven income opportunities based on skills they already have.

  Provide:
  1. 3 specific side hustle ideas tailored to their skills and schedule — with a clear explanation of why each one fits them personally
  2. Realistic monthly earnings for each idea at their stated time commitment, including how long it typically takes to reach that level
  3. A concrete startup checklist for each: what to sign up for, what tools or accounts they need, and any upfront costs
  4. The single best option to start this week, with a step-by-step plan for their first 7 days

  Be honest about effort vs. reward — no hype, no get-rich-quick promises. Make them feel like they have a clear, doable plan, not a fantasy.
