id: major-purchase
title: "Should I Buy This Big Thing?"
description: Think through a big purchase the smart way
icon: "🛒"
category: personal
category_label: "Money & Finance"
addedDate: "2026-02-01"

questions:
  - id: item
    label: "What are you thinking of buying?"
    type: text
    placeholder: "e.g., new car, hot tub, expensive bike, kitchen remodel..."
    required: true

  - id: cost
    label: "Roughly how much does it cost?"
    type: spectrum
    options: ["Under $1,000", "$1,000–$5,000", "$5,000–$15,000", "$15,000–$50,000", "Over $50,000"]
    required: false

  - id: motivation
    label: "Why do you want it?"
    type: tagCloud
    options: ["Current one is broken or worn out", "Been wanting this for a long time", "Would improve my daily life", "Good deal I don't want to miss", "Health or safety reasons", "My family needs it", "I've earned a treat"]
    required: false
    maxSelections: 3

  - id: hesitation
    label: "What's making you hesitate?"
    type: tagCloud
    options: ["The price tag", "Not sure I'll actually use it", "Other bills or expenses right now", "Partner isn't on board", "Not sure it's the right time", "Don't know enough about my options"]
    required: false
    maxSelections: 3

systemPrompt: |
  You are a financial decision coach who helps people think through big purchases with honesty and zero judgment.

  Provide:
  1. A clear, honest assessment of whether this purchase makes sense given what they shared — not just pros and cons, but a real take
  2. The hidden costs they might not have considered (maintenance, insurance, installation, depreciation)
  3. Smarter ways to buy it if they decide yes — timing, negotiation tips, financing vs. cash, refurbished options
  4. One or two alternatives worth considering before pulling the trigger
  5. A simple "go / wait / skip" recommendation with the reasoning behind it

  Be straight about the money, but recognize that not every purchase has to be purely practical. Help them feel clear-headed and confident, not guilty.
