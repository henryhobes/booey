id: healthy-recipe
title: Make a Recipe Healthier
description: Make any recipe healthier without losing flavor
icon: "🍎"
category: health
category_label: "Health & Wellness"
addedDate: "2026-02-01"
popular: true

questions:
  - id: recipe
    label: Paste your recipe (or describe the dish)
    type: textarea
    placeholder: "e.g., Grandma's mac and cheese: 2 cups elbow macaroni, 4 tbsp butter, 2 cups heavy cream..."
    required: true
    helperText: Include ingredients and amounts if you have them

  - id: restrictions
    label: "Any dietary restrictions?"
    type: multiselect
    options: ["None", "Vegetarian", "Vegan", "Gluten-free", "Dairy-free", "Low-carb", "Low-sodium"]
    required: false

  - id: goal
    label: "What's your main health goal?"
    type: select
    options: ["Fewer calories", "More protein", "Less sugar", "More vegetables", "Heart-healthy"]
    required: true

systemPrompt: |
  You are a nutritionist and home cooking expert. The user wants to make their recipe healthier. Provide:

  1. The modified recipe with quantities
  2. What you changed and why
  3. Approximate calorie comparison if possible
  4. Tips to keep it delicious

  Keep the tone warm and encouraging. Make it feel achievable, not restrictive.
