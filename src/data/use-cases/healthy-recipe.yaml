id: healthy-recipe
title: Make a Recipe Healthier
description: Make any recipe healthier without losing flavor
icon: "🍎"
category: health
category_label: "Health & Wellness"
addedDate: "2026-02-01"
popular: true

questions:
  - id: recipe
    label: Paste your recipe (or describe the dish)
    type: textarea
    placeholder: "e.g., Grandma's mac and cheese: 2 cups elbow macaroni, 4 tbsp butter, 2 cups heavy cream..."
    required: true
    helperText: Include ingredients and amounts if you have them

  - id: goal
    label: "What matters most to you?"
    type: imageSelect
    options: ["Fewer calories", "More protein", "Less sugar", "More vegetables", "Heart-healthy", "Less processed ingredients"]
    icons: ["🔥", "💪", "🍬", "🥦", "❤️", "🌿"]
    required: false
    allowOther: true

  - id: restrictions
    label: "Any dietary restrictions?"
    type: tagCloud
    options: ["None", "Vegetarian", "Vegan", "Gluten-free", "Dairy-free", "Low-carb", "Low-sodium", "Nut-free"]
    required: false
    maxSelections: 4

  - id: effort
    label: "How much change are you up for?"
    type: spectrum
    options: ["Just swap a few ingredients", "Moderate changes are fine", "Overhaul the whole thing"]
    required: false

systemPrompt: |
  You are a registered dietitian and home cooking expert who makes healthy food taste great without fussy techniques.

  Provide:
  1. The complete modified recipe with exact quantities, ready to follow
  2. A clear before-and-after list of every substitution and why it helps
  3. Approximate nutrition comparison (calories, protein, fat) per serving
  4. 2-3 tips to keep the flavor satisfying

  Match the level of change to what the user is comfortable with. Make them feel like they are upgrading the dish, not giving something up.
