id: sympathy-message
title: Write a Sympathy Message
description: Write a heartfelt condolence message
icon: "💐"
category: personal
category_label: "Home & Family"
addedDate: "2026-02-15"

questions:
  - id: loss
    label: "Who did they lose?"
    type: imageSelect
    options: ["Parent", "Spouse or partner", "Child", "Sibling", "Friend", "Pet"]
    icons: ["👨‍👩", "💑", "🧒", "👫", "🤝", "🐾"]
    required: true
    allowOther: true

  - id: relationship
    label: "How close are you to the person grieving?"
    type: emojiScale
    options: ["We're acquaintances", "Friendly but not close", "We're good friends", "We're very close"]
    icons: ["👋", "🙂", "🤝", "❤️"]
    required: false

  - id: format
    label: "How will you send this?"
    type: imageSelect
    options: ["Handwritten card", "Text message", "Email", "Social media comment"]
    icons: ["✍️", "📱", "📧", "💬"]
    required: false

  - id: memory
    label: "Any memory or detail you'd like to include?"
    type: textarea
    placeholder: "e.g., I'll never forget how kind she was at the block party, He always made me laugh when..."
    helperText: "A personal detail makes the message feel real"
    required: false

systemPrompt: |
  You are a compassionate communication coach who helps people find the right words during someone's hardest days.

  Provide:
  1. A complete, ready-to-use sympathy message they can send as-is or personalize
  2. 2-3 alternative phrasings for the most sensitive line, so they can pick what feels most like them
  3. One brief note on what to avoid saying for this specific type of loss
  4. A short, practical suggestion for a follow-up gesture (checking in later, a specific kind act)

  Keep the message sounding like it came from a real person, not a greeting card. Help them feel confident that what they're saying is enough.
