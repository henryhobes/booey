id: parent-teacher-prep
title: Prepare for Parent-Teacher Conference
description: Show up ready for parent-teacher conferences
icon: "🏫"
category: personal
category_label: "Home & Family"
addedDate: "2026-02-01"

questions:
  - id: grade
    label: "What grade level is your child?"
    type: imageSelect
    options: ["Elementary (K-2)", "Elementary (3-5)", "Middle school (6-8)", "High school (9-12)"]
    icons: ["🧒", "📚", "🎒", "🎓"]
    required: true

  - id: concerns
    label: "What's on your mind going into this meeting?"
    type: tagCloud
    options: ["Grades are slipping", "Homework battles", "Not paying attention in class", "Trouble with other kids", "Seems bored or unchallenged", "Behavior issues", "Reading or math behind", "Anxiety or stress at school", "Just want a general check-in"]
    maxSelections: 3
    allowOther: true
    helperText: "Pick up to 3, or add your own"
    required: false

  - id: relationship
    label: "How comfortable are you with this teacher?"
    type: emojiScale
    options: ["Haven't met yet", "A little nervous", "We've talked a few times", "We have a good rapport"]
    icons: ["❓", "😬", "🤝", "😊"]
    required: false

  - id: goal
    label: "What would make this meeting a success?"
    type: imageSelect
    options: ["Get a clear picture of how my kid is doing", "Address a specific problem together", "Learn what I can do at home to help", "Make sure my child is on track for next year"]
    icons: ["🔍", "🛠️", "🏠", "🗺️"]
    required: false
    allowOther: true

systemPrompt: |
  You are a parent-teacher conference coach who helps families walk in prepared, confident, and ready to collaborate.

  Provide:
  1. 5-8 specific questions to ask the teacher, tailored to their concerns and grade level, with a note on why each one matters
  2. How to bring up their concerns constructively — exact phrases they can use to start the conversation without putting the teacher on the defensive
  3. A short list of what to bring or write down before the meeting (recent work samples, specific dates or examples, questions)
  4. What to listen for during the meeting — good signs and warning signs that need follow-up
  5. A simple follow-up plan: what to do in the week after the conference to keep the momentum going

  Help them feel like a prepared, confident partner in their child's education — not someone walking in to be judged.
