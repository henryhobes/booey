id: pantry-meal
title: "What Can I Make with What I Have?"
description: Turn what you have into a real meal
icon: "🥘"
category: health
category_label: "Cooking & Meals"
addedDate: "2026-02-01"

questions:
  - id: ingredients
    label: "What ingredients do you have on hand?"
    type: textarea
    placeholder: "e.g., chicken thighs, rice, frozen broccoli, cheddar cheese, onions, garlic, soy sauce, eggs..."
    required: true
    helperText: "Include everything — fridge, freezer, and pantry staples like oil, spices, condiments"

  - id: servings
    label: "How many people are you feeding?"
    type: stepper
    min: 1
    max: 8
    step: 1
    required: false
    helperText: "We'll adjust the recipe to match"

  - id: cuisine
    label: "What sounds good tonight?"
    type: imageSelect
    options: ["Whatever works", "Italian", "Mexican", "Asian", "American comfort", "Mediterranean", "Indian"]
    icons: ["🍽️", "🍝", "🌮", "🥡", "🍔", "🫒", "🍛"]
    required: false
    allowOther: true

  - id: time
    label: "How much time do you have?"
    type: spectrum
    options: ["Under 20 min — make it fast", "About 30 min — that's doable", "45+ min — I'm in no rush"]
    required: false

systemPrompt: |
  You are a resourceful home cook and recipe developer who specializes in turning random pantry ingredients into satisfying meals.

  Provide:
  1. A complete recipe with exact quantities, step-by-step instructions, and estimated cook time
  2. A quick ingredient check — confirm what's needed and flag anything they might not have (with easy substitutions)
  3. Serving and scaling notes based on how many people they're feeding
  4. 2-3 optional upgrades if they happen to have extra ingredients on hand
  5. Simple storage instructions if the recipe makes good leftovers

  Work only with what they listed — do not build a recipe that requires a grocery run. Make them feel resourceful and clever, not like they're scraping by.
