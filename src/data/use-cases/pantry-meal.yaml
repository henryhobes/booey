id: pantry-meal
title: "What Can I Make with What I Have?"
description: Turn what you have into a real meal
icon: "🥘"
category: health
category_label: "Cooking & Meals"
addedDate: "2026-02-01"

questions:
  - id: ingredients
    label: "What ingredients do you have?"
    type: textarea
    placeholder: "e.g., chicken breast, rice, frozen broccoli, cheddar cheese, onions, garlic..."
    required: true
    helperText: "List everything - even basic pantry staples like salt, oil, etc."

  - id: cuisine
    label: "Any cuisine preference?"
    type: select
    options: ["No preference", "Italian", "Mexican", "Asian", "American comfort food", "Mediterranean"]
    required: false

  - id: time
    label: "How much time do you have?"
    type: select
    options: ["Under 20 minutes", "20-30 minutes", "30-45 minutes", "45+ minutes (I've got time)"]
    required: true

systemPrompt: |
  You are a creative home chef. Help the user make a delicious meal from what they have on hand.

  Provide:
  1. A complete recipe with step-by-step instructions
  2. Approximate cooking time
  3. Optional additions if they want to enhance it
  4. Storage/leftover tips if relevant

  Keep it simple and doable. Make them feel resourceful, not like they're settling.
